# ──────────────────────────────────────────────────────────────────────────────
# coturn turnserver.conf — sfu.sideby.me self-hosted TURN/STUN (TURN-01/02)
#
# [VERIFIED: directives checked against the coturn wiki "turnserver" + turnserver.conf
#  reference and coturn/coturn issues #725 / #1134 — 2026-06-09]
#
# AUTH MODEL (Pitfall 3 / TURN-02): time-limited HMAC credentials, NEVER static
# `user=` creds. coturn holds a single `static-auth-secret`; the SFU mints
# per-join creds as:
#     username   = <unix-expiry>:<opaque-participant-id>
#     credential = base64( HMAC-SHA1( static-auth-secret, username ) )
# (see sfu.sideby.me/src/turn/ice-servers.ts). This `static-auth-secret` MUST be
# byte-identical to the SFU's TURN_STATIC_AUTH_SECRET env var, or every minted
# credential fails HMAC validation and `turns:` silently never connects.
#
# CERT RELOAD (Pitfall 7 — CORRECTION): coturn hot-reloads its TLS cert on
# **SIGUSR2**, NOT SIGHUP. The certbot deploy-hook (scripts/certbot-deploy-hook.sh)
# MUST `docker kill -s USR2 <coturn>` on renewal, or restart the container —
# otherwise after ~90 days `turns:` serves an expired cert and strict clients drop.
#
# START QUIRK (coturn #1134): some `static-auth-secret` builds want a DH file/cert
# present to start cleanly — the real LE cert mounted below satisfies this; if a
# stripped image still complains, add `dh-file=/etc/coturn/certs/turn.sideby.me/dhparam.pem`.
# ──────────────────────────────────────────────────────────────────────────────

# ── Listeners ────────────────────────────────────────────────────────────────
# Plain TURN/STUN (UDP+TCP) on 3478; turns: TLS on 5349 (the nginx SNI router on
# :443 forwards turn.sideby.me here). Bind all interfaces on the host-networked droplet.
listening-port=3478
tls-listening-port=5349
# Bind ONLY the public IP + loopback (NOT 0.0.0.0) — deliberate and load-bearing for
# forced-relay to the CO-LOCATED SFU (D-01). coturn refuses to relay to any IP it deems
# "its own", and that set = its configured listening IPs. Binding 0.0.0.0 makes EVERY
# host IP (incl. the SFU's private VPC IP) coturn's own → CREATE_PERMISSION 403 Forbidden
# IP → relay media never flows. Binding public+loopback leaves the private VPC IP free,
# so coturn WILL relay to the SFU there (see allowed-peer-ip below + the SFU's
# MEDIASOUP_PRIVATE_IP dual candidate). 127.0.0.1 is required so the nginx SNI router
# (→ 127.0.0.1:5349) can reach turns:.
listening-ip=<PUBLIC_IP>
listening-ip=127.0.0.1

# ── Identity / realm ─────────────────────────────────────────────────────────
realm=sideby.me
server-name=turn.sideby.me
# Public IPv4 advertised as the relay address. If the droplet is behind 1:1 NAT use
# the external-ip=<PUBLIC>/<PRIVATE> form so coturn advertises the public address.
external-ip=<PUBLIC_IP>

# ── Relay port range ─────────────────────────────────────────────────────────
# Allocations for relayed transports. Open this UDP range on the host firewall.
min-port=49152
max-port=65535

# ── Authentication (HMAC time-limited, TURN REST API) ────────────────────────
use-auth-secret
# MUST match the SFU's TURN_STATIC_AUTH_SECRET (HMAC mint side). Replace at deploy.
static-auth-secret=<TURN_STATIC_AUTH_SECRET>
lt-cred-mech
fingerprint

# ── TLS (turns:) — real Let's Encrypt cert for turn.sideby.me ────────────────
# NEVER self-signed (Pitfall 6): strict clients reject a mismatched cert and the
# turns: candidate silently never connects. The whole /etc/letsencrypt tree is mounted
# by docker-compose (live/ holds symlinks into ../../archive/, so a narrow mount dangles);
# renewals hot-reloaded via SIGUSR2 (see header).
cert=/etc/letsencrypt/live/turn.sideby.me/fullchain.pem
pkey=/etc/letsencrypt/live/turn.sideby.me/privkey.pem

# ── Logging ──────────────────────────────────────────────────────────────────
# Log to stdout in a single simple format so coturn lands in `docker logs` / the OTLP
# log pipeline instead of an in-container file. Add `verbose` for allocation-level debug.
log-file=stdout
simple-log

# ── Hardening (relay-abuse controls — T-01-20) ───────────────────────────────
no-cli
no-multicast-peers
# Permit relaying to the co-located SFU's private VPC candidate (the SFU's
# MEDIASOUP_PRIVATE_IP). Required because coturn binds public+loopback only (above), so
# the private IP is NOT coturn's own — this allow lets CREATE_PERMISSION succeed for the
# SFU relay leg. (`no-loopback-peers` was removed: it is NOT a valid coturn directive —
# it logs "Bad configuration format" and is ignored.)
allowed-peer-ip=<PRIVATE_IP>
# Cap concurrent allocations to bound bandwidth-abuse blast radius. DO egress
# (coturn relay bandwidth) is the variable cost to watch (D-04), not CPU.
total-quota=100
