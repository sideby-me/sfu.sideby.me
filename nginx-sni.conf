# ──────────────────────────────────────────────────────────────────────────────
# nginx-sni.conf — SNI router on :443 (D-05/D-06)
#
# This is a `stream {}` block (L4), NOT `http {}`. It peeks the TLS ClientHello SNI
# via `ssl_preread on` and proxies the RAW TLS stream to the right backend — it does
# NOT terminate TLS. coturn (turns:) and the SFU WSS backend each own their own TLS.
#
# Why this works: `turns:` is itself TLS-wrapped, so coturn's :5349 connection presents
# an SNI ClientHello that ssl_preread can read — letting both subdomains share one :443.
#
# Requires nginx built --with-stream_ssl_preread_module. The official nginx:1.27 image
# includes it (RESEARCH A3 — verify at deploy with `nginx -V 2>&1 | grep ssl_preread`).
#
# Backend ports (host networking — all on the same host):
#   sfu.sideby.me  -> 127.0.0.1:8443  WSS backend (terminates its own TLS — RESEARCH Q1)
#   turn.sideby.me -> 127.0.0.1:5349  coturn turns: (terminates its own TLS)
# ──────────────────────────────────────────────────────────────────────────────

# ssl_preread requires no worker connections tuning here; keep the global shell minimal.
events {}

stream {
    # Route by the SNI hostname peeked from the ClientHello. Default to the WSS
    # backend so a bare-IP / unknown-SNI hit lands somewhere sane (still TLS-terminated
    # downstream — no plaintext is ever served by the router).
    map $ssl_preread_server_name $upstream {
        sfu.sideby.me   sfu_wss;
        turn.sideby.me  coturn_tls;
        default         sfu_wss;
    }

    # WSS backend: the SFU's WSS terminator on 8443 (RESEARCH Q1 resolution — the SFU
    # signaling gateway listens plain on SFU_WSS_PORT=8443 behind a thin TLS terminator,
    # OR a Node https server on 8443; either way the router only forwards the raw stream).
    upstream sfu_wss {
        server 127.0.0.1:8443;
    }

    # coturn turns: TLS endpoint.
    upstream coturn_tls {
        server 127.0.0.1:5349;
    }

    server {
        listen 443;
        ssl_preread on; # peek SNI, do NOT terminate TLS
        proxy_pass $upstream;
        proxy_protocol off;
    }
}
